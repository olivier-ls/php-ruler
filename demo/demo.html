<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>php-ruler — demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap">
  <style>
    :root {
      --bg:          #080c14;
      --surface:     #0f1623;
      --surface-2:   #161e2e;
      --surface-3:   #1c2638;
      --border:      #1e2d43;
      --border-2:    #263550;
      --text:        #dce6f5;
      --text-dim:    #8fa4c0;
      --text-muted:  #4d6480;
      --accent:      #4d9eff;
      --accent-dim:  rgba(77,158,255,.1);
      --accent-glow: rgba(77,158,255,.2);
      --success:     #3dd68c;
      --success-dim: rgba(61,214,140,.08);
      --error:       #f0605a;
      --error-dim:   rgba(240,96,90,.08);
      --warning:     #f5a623;
      --skip:        #3d5068;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --r: 6px;
      --r-sm: 4px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -.3px;
    }

    .logo-dot { color: var(--text-muted); }

    .badge {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(77,158,255,.25);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .header-sep {
      flex: 1;
    }

    .header-hint {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    kbd {
      display: inline-block;
      padding: 1px 5px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 3px;
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    /* ─── LAYOUT ─── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .main {
      display: grid;
      grid-template-columns: 400px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ─── LEFT PANEL ─── */
    .panel-left {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-height: 0;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .section.grow {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--text-muted);
      margin-bottom: 9px;
    }

    /* ─── EXPRESSION INPUT ─── */
    .expr-wrap {
      position: relative;
    }

    textarea.expr-input {
      width: 100%;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      color: var(--text);
      resize: none;
      outline: none;
      min-height: 72px;
      transition: border-color .15s, box-shadow .15s;
    }

    textarea.expr-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    textarea.expr-input.err {
      border-color: var(--error);
      box-shadow: 0 0 0 3px var(--error-dim);
    }

    /* ─── AUTOCOMPLETE ─── */
    .ac {
      position: absolute;
      top: calc(100% + 3px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      box-shadow: 0 12px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(0,0,0,.3);
      z-index: 200;
      overflow: hidden;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .ac.open { display: block; }

    .ac-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
      transition: background .08s;
    }

    .ac-row:hover, .ac-row.sel {
      background: var(--surface-3);
    }

    .ac-tag {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: .04em;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .ac-tag.variable { background: rgba(77,158,255,.15);  color: var(--accent);   }
    .ac-tag.alias    { background: rgba(61,214,140,.13);  color: var(--success);  }
    .ac-tag.function { background: rgba(245,166,35,.12);  color: var(--warning);  }
    .ac-tag.keyword  { background: rgba(143,164,192,.1);  color: var(--text-dim); }

    .ac-label {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ac-label mark {
      background: none;
      color: var(--accent);
      font-weight: 600;
    }

    .ac-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ─── EXAMPLES ─── */
    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 99px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      color: var(--text-dim);
      cursor: pointer;
      transition: all .13s;
      white-space: nowrap;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── CONTEXT ─── */
    textarea.ctx-input {
      width: 100%;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      color: var(--text-dim);
      resize: none;
      outline: none;
      flex: 1;
      min-height: 0;
    }

    textarea.ctx-input:focus {
      border-color: var(--border-2);
      color: var(--text);
    }

    /* ─── ACTIONS ─── */
    .actions {
      display: flex;
      gap: 7px;
      padding: 11px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: var(--r-sm);
      cursor: pointer;
      border: none;
      transition: all .13s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #060b14;
      flex: 1;
      font-weight: 600;
    }

    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.12);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border-2);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── RIGHT PANEL ─── */
    .panel-right {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ─── RESULT ─── */
    .result-area {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .result-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
    }

    .result-badge.idle    { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border-2); }
    .result-badge.ok      { background: var(--success-dim); color: var(--success);  border: 1px solid rgba(61,214,140,.2); }
    .result-badge.fail    { background: var(--error-dim);   color: var(--error);    border: 1px solid rgba(240,96,90,.2); }
    .result-badge.value   { background: var(--surface-2);   color: var(--accent);   border: 1px solid var(--border-2); }

    .result-type {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      padding: 3px 8px;
      background: var(--surface-2);
      border-radius: 99px;
      border: 1px solid var(--border);
    }

    .result-error {
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--error);
      padding: 9px 12px;
      background: var(--error-dim);
      border-radius: var(--r-sm);
      border-left: 2px solid var(--error);
      line-height: 1.6;
      word-break: break-word;
    }

    .spinner-wrap {
      display: none;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
    }

    .spinner-wrap.on { display: flex; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .55s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── EXPLAIN TREE ─── */
    .explain-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .explain-empty {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .tree-node {
      margin-bottom: 3px;
    }

    .tree-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border-radius: var(--r-sm);
      cursor: default;
      transition: background .08s;
      border-left: 2px solid transparent;
    }

    .tree-node.ok   > .tree-row { border-left-color: var(--success); }
    .tree-node.fail > .tree-row { border-left-color: var(--error); }
    .tree-node.skip > .tree-row { border-left-color: var(--skip); opacity: .45; }
    .tree-node.miss > .tree-row { border-left-color: var(--warning, #d6a338); }
    .tree-node.err  > .tree-row { border-left-color: var(--error); }

    .tree-row:hover { background: var(--surface-2); cursor: pointer; }

    .tree-icon {
      font-size: 11px;
      flex-shrink: 0;
    }

    .tree-node.ok   .tree-icon { color: var(--success); }
    .tree-node.fail .tree-icon { color: var(--error); }
    .tree-node.skip .tree-icon { color: var(--skip); }
    .tree-node.miss .tree-icon { color: var(--warning, #d6a338); }
    .tree-node.err  .tree-icon { color: var(--error); }

    /* Reason line for missing variables / runtime errors (the "why") */
    .tree-detail {
      font-family: var(--mono);
      font-size: 10.5px;
      margin: 2px 0 4px 28px;
      padding: 3px 8px;
      border-radius: var(--r-sm);
      background: var(--surface-2);
      color: var(--text-muted);
    }
    .tree-node.err  > .tree-detail { color: var(--error); }
    .tree-node.miss > .tree-detail { color: var(--warning, #d6a338); }

    .tree-chevron {
      font-size: 9px;
      color: var(--text-muted);
      width: 10px;
      flex-shrink: 0;
      transition: transform .15s;
    }

    .tree-chevron.closed { transform: rotate(-90deg); }

    .tree-expr {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      flex: 1;
    }

    .tree-node.skip .tree-expr {
      color: var(--text-muted);
      font-style: italic;
    }

    .tree-vals {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .tree-val-left  { color: var(--accent); }
    .tree-val-op    { color: var(--text-muted); margin: 0 3px; }
    .tree-val-right { color: var(--text-dim); }

    .tree-children {
      margin-left: 18px;
      padding-left: 10px;
      border-left: 1px solid var(--border);
      margin-top: 3px;
    }

    /* ─── SCROLLBARS ─── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-2); }
  </style>
</head>
<body>

<div class="app">

  <header class="header">
    <span class="logo">expr<span class="logo-dot">::</span>eval</span>
    <span class="badge">demo</span>
    <div class="header-sep"></div>
    <span class="header-hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> to evaluate &nbsp;·&nbsp; <kbd>Tab</kbd> to complete</span>
  </header>

  <div class="main">

    <!-- ─── LEFT ─── -->
    <div class="panel-left">

      <div class="section">
        <div class="section-label">Expression</div>
        <div class="expr-wrap">
          <textarea class="expr-input" id="expr-input" rows="3"
            placeholder="cart.total > 100 AND customer.vip = true"
            spellcheck="false"></textarea>
          <div class="ac" id="ac"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Quick examples</div>
        <div class="examples" id="examples"></div>
      </div>

      <div class="section grow">
        <div class="section-label">Context (JSON)</div>
        <textarea class="ctx-input" id="ctx-input" spellcheck="false"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-ghost" id="btn-validate">Validate syntax</button>
        <button class="btn btn-primary" id="btn-eval">Evaluate →</button>
      </div>

    </div>

    <!-- ─── RIGHT ─── -->
    <div class="panel-right">

      <div class="result-area">
        <div class="section-label">Result</div>
        <div class="spinner-wrap" id="spinner">
          <div class="spinner"></div>
          <span style="font-size:12px;color:var(--text-muted)">Evaluating…</span>
        </div>
        <div id="result">
          <div class="result-inner">
            <span class="result-badge idle">— idle</span>
          </div>
        </div>
      </div>

      <div class="explain-area">
        <div class="section-label">Evaluation trace</div>
        <div id="tree">
          <p class="explain-empty">The evaluation tree appears here after you run an expression.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ================================================================
//  CONFIG — generate this block from PHP :
//  echo 'const CONFIG = ' . json_encode($eval->describeConfig()) . ';';
// ================================================================
const CONFIG = {
  endpoint: './evaluate.php',

  variables: [
    { path: 'cart.total',            alias: 'cart total',   type: 'float'  },
    { path: 'cart.items',            alias: 'cart items',  type: 'list'   },
    { path: 'customer.group',        alias: 'customer group',       type: 'string' },
    { path: 'customer.vip',          alias: 'vip customer',          type: 'bool'   },
    { path: 'customer.tags',         alias: 'customer tags',         type: 'list'   },
    { path: 'customer.address.city', alias: 'customer city',     type: 'string' },
    { path: 'product.category',      alias: 'product category',   type: 'string' },
    { path: 'product.price',         alias: 'product price',        type: 'float'  },
    { path: 'order.date',            alias: 'order date',    type: 'string' },
  ],

  functions: [
    { name: 'round',      sig: 'round(val, precision?)'    },
    { name: 'floor',      sig: 'floor(val)'                },
    { name: 'ceil',       sig: 'ceil(val)'                 },
    { name: 'abs',        sig: 'abs(val)'                  },
    { name: 'min',        sig: 'min(a, b)'                 },
    { name: 'max',        sig: 'max(a, b)'                 },
    { name: 'clamp',      sig: 'clamp(val, min, max)'      },
    { name: 'pow',        sig: 'pow(base, exp)'            },
    { name: 'sqrt',       sig: 'sqrt(val)'                 },
    { name: 'length',     sig: 'length(val)'               },
    { name: 'upper',      sig: 'upper(str)'                },
    { name: 'lower',      sig: 'lower(str)'                },
    { name: 'trim',       sig: 'trim(str)'                 },
    { name: 'contains',   sig: 'contains(str, needle)'     },
    { name: 'startsWith', sig: 'startsWith(str, needle)'   },
    { name: 'endsWith',   sig: 'endsWith(str, needle)'     },
    { name: 'substr',     sig: 'substr(str, start, len?)'  },
    { name: 'today',      sig: 'today()'                   },
    { name: 'now',        sig: 'now()'                     },
    { name: 'year',       sig: 'year(date)'                },
    { name: 'month',      sig: 'month(date)'               },
    { name: 'day',        sig: 'day(date)'                 },
    { name: 'hour',       sig: 'hour(date)'                },
    { name: 'minute',     sig: 'minute(date)'              },
    { name: 'dateDiff',   sig: 'dateDiff(date1, date2)'    },
    { name: 'dateAdd',    sig: 'dateAdd(date, n, unit)'    },
  ],

  examples: [
    "cart.total >= 50",
    "customer.vip = true AND cart.total >= 50 AND product.price < 10 OR customer.group = 'vip'",
    "product.category IN ['clothing', 'shoes', 'boots']",
    "customer.group NOT IN ['blocked', 'banned']",
    "customer.vip = true ? 'premium' : 'standard'",
    "customer.discount ?? 0",
    "round(cart.total * 0.9, 2)",
    "dateDiff(today(), order.date) > 0",
    "cart.total > 500 AND product.price < 10",
    "cart.total > customer.creditLimit",
  ],
};

const DEFAULT_CONTEXT = {
  cart:     { total: 150.00, items: ['shirt', 'pants'] },
  customer: { group: 'vip', vip: true, tags: ['vip', 'newsletter'], address: { city: 'Paris' } },
  product:  { category: 'clothing', price: 49.99 },
  order:    { date: '2025-01-15' },
};

// ================================================================
//  WIDGET
// ================================================================
class PhpRulerWidget {
  constructor(cfg) {
    this.cfg    = cfg;
    this.suggs  = [];
    this.matches = [];
    this.acIdx  = -1;
    this.acOpen = false;

    this.$expr     = document.getElementById('expr-input');
    this.$ac       = document.getElementById('ac');
    this.$ctx      = document.getElementById('ctx-input');
    this.$result   = document.getElementById('result');
    this.$tree     = document.getElementById('tree');
    this.$spinner  = document.getElementById('spinner');
    this.$btnEval  = document.getElementById('btn-eval');
    this.$btnVal   = document.getElementById('btn-validate');
    this.$examples = document.getElementById('examples');

    this._buildSuggestions();
    this._renderExamples();
    this.$ctx.value = JSON.stringify(DEFAULT_CONTEXT, null, 2);
    this._bind();
  }

  // ── suggestions ──────────────────────────────────────────────

  _buildSuggestions() {
    const KEYWORDS = [
      { k: 'AND', insert: 'AND ' }, { k: 'OR', insert: 'OR ' },
      { k: 'NOT', insert: 'NOT ' }, { k: 'IN', insert: 'IN ' },
      { k: 'NOT IN', insert: 'NOT IN ' },
      { k: 'true', insert: 'true' }, { k: 'false', insert: 'false' },
      { k: 'null', insert: 'null' },
    ];
    for (const v of this.cfg.variables) {
      this.suggs.push({ label: v.path,  hint: v.alias, type: 'variable', ins: v.path  });
      if (v.alias) {
        this.suggs.push({ label: v.alias, hint: v.path, type: 'alias',    ins: v.alias });
      }
    }
    for (const f of this.cfg.functions) {
      this.suggs.push({ label: f.name, hint: f.sig, type: 'function', ins: f.name + '(' });
    }
    for (const kw of KEYWORDS) {
      this.suggs.push({ label: kw.k, hint: '', type: 'keyword', ins: kw.insert });
    }
  }

  _renderExamples() {
    this.$examples.innerHTML = '';
    for (const ex of this.cfg.examples) {
      const b = document.createElement('button');
      b.className = 'chip';
      b.textContent = ex;
      b.title = ex;
      b.addEventListener('click', () => {
        this.$expr.value = ex;
        this.$expr.focus();
        this._closeAc();
      });
      this.$examples.appendChild(b);
    }
  }

  // ── events ───────────────────────────────────────────────────

  _bind() {
    this.$expr.addEventListener('input',   () => this._onInput());
    this.$expr.addEventListener('keydown', (e) => this._onKey(e));
    this.$expr.addEventListener('blur',    () => setTimeout(() => this._closeAc(), 160));
    this.$btnEval.addEventListener('click',  () => this._evaluate());
    this.$btnVal.addEventListener('click',   () => this._validate());
  }

  // ── autocomplete ─────────────────────────────────────────────

  _token() {
    const val = this.$expr.value;
    const pos = this.$expr.selectionStart;
    const before = val.slice(0, pos);
    const m = before.match(/[\wÀ-ÿ. ]+$/u);
    if (!m) return '';
    // trim only leading spaces, keep trailing (could be "NOT I...")
    return m[0].replace(/^\s+/, '');
  }

  _tokenStart() {
    const val = this.$expr.value;
    const pos = this.$expr.selectionStart;
    const before = val.slice(0, pos);
    const m = before.match(/[\wÀ-ÿ. ]+$/u);
    if (!m) return pos;
    const raw = m[0];
    const trimmed = raw.replace(/^\s+/, '');
    return pos - trimmed.length;
  }

  _onInput() {
    const tok = this._token();
    if (!tok || tok.length < 1) { this._closeAc(); return; }
    const low = tok.toLowerCase();
    this.matches = this.suggs.filter(s =>
      s.label.toLowerCase().startsWith(low) && s.label.toLowerCase() !== low
    ).slice(0, 12);
    if (!this.matches.length) { this._closeAc(); return; }
    this.acIdx = -1;
    this._renderAc(tok);
    this._openAc();
  }

  _renderAc(tok) {
    this.$ac.innerHTML = '';
    this.matches.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'ac-row' + (i === this.acIdx ? ' sel' : '');
      row.innerHTML =
        `<span class="ac-tag ${s.type}">${s.type === 'variable' ? 'var' : s.type === 'function' ? 'fn' : s.type === 'alias' ? 'alias' : 'kw'}</span>` +
        `<span class="ac-label">${this._hl(s.label, tok)}</span>` +
        (s.hint ? `<span class="ac-hint">${esc(s.hint)}</span>` : '');
      row.addEventListener('mousedown', (e) => { e.preventDefault(); this._insert(s); });
      this.$ac.appendChild(row);
    });
  }

  _hl(label, tok) {
    const idx = label.toLowerCase().indexOf(tok.toLowerCase());
    if (idx === -1) return esc(label);
    return esc(label.slice(0, idx)) + '<mark>' + esc(label.slice(idx, idx + tok.length)) + '</mark>' + esc(label.slice(idx + tok.length));
  }

  _onKey(e) {
    // Ctrl/Cmd+Enter → evaluate
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      this._closeAc();
      this._evaluate();
      return;
    }
    if (!this.acOpen) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      this.acIdx = Math.min(this.acIdx + 1, this.matches.length - 1);
      this._renderAc(this._token());
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      this.acIdx = Math.max(this.acIdx - 1, -1);
      this._renderAc(this._token());
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const target = this.acIdx >= 0 ? this.matches[this.acIdx] : this.matches[0];
      if (target) this._insert(target);
    } else if (e.key === 'Enter' && this.acIdx >= 0) {
      e.preventDefault();
      this._insert(this.matches[this.acIdx]);
    } else if (e.key === 'Escape') {
      this._closeAc();
    }
  }

  _insert(s) {
    const val = this.$expr.value;
    const pos = this.$expr.selectionStart;
    const start = this._tokenStart();
    const after = val.slice(pos);
    this.$expr.value = val.slice(0, start) + s.ins + after;
    const np = start + s.ins.length;
    this.$expr.setSelectionRange(np, np);
    this.$expr.focus();
    this._closeAc();
  }

  _openAc()  { this.$ac.classList.add('open');    this.acOpen = true;  }
  _closeAc() { this.$ac.classList.remove('open'); this.acOpen = false; this.acIdx = -1; }

  // ── API calls ─────────────────────────────────────────────────

  _ctx() {
    try   { return JSON.parse(this.$ctx.value); }
    catch { return null; }
  }

  _loading(on) {
    this.$spinner.classList.toggle('on', on);
    this.$result.style.visibility = on ? 'hidden' : '';
    this.$btnEval.disabled = on;
  }

  async _evaluate() {
    const expr = this.$expr.value.trim();
    if (!expr) return;
    const ctx = this._ctx();
    if (ctx === null) { this._showError('Invalid context JSON'); return; }

    this.$expr.classList.remove('err');
    this._loading(true);

    try {
      const res  = await fetch(this.cfg.endpoint, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ expression: expr, context: ctx, mode: 'evaluate' }),
      });
      const data = await res.json();
      this._loading(false);

      if (data.error) {
        this._showError(data.error);
        this.$expr.classList.add('err');
        this.$tree.innerHTML = '<p class="explain-empty">—</p>';
      } else {
        this._showResult(data.result, data.type);
        if (data.explain) this._renderTree(data.explain);
        else this.$tree.innerHTML = '<p class="explain-empty">No explain data.</p>';
      }
    } catch (e) {
      this._loading(false);
      this._showError('Endpoint unreachable — check that evaluate.php is in place.<br><small>' + esc(e.message) + '</small>');
    }
  }

  async _validate() {
    const expr = this.$expr.value.trim();
    if (!expr) return;
    this.$expr.classList.remove('err');
    this._loading(true);

    try {
      const res  = await fetch(this.cfg.endpoint, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ expression: expr, context: {}, mode: 'validate' }),
      });
      const data = await res.json();
      this._loading(false);

      if (data.error) {
        this._showError(data.error);
        this.$expr.classList.add('err');
      } else {
        this.$result.innerHTML = `<div class="result-inner">
          <span class="result-badge ok">✓ &nbsp;Valid syntax</span>
        </div>`;
        this.$tree.innerHTML = '<p class="explain-empty">Syntax OK — evaluate to see the trace.</p>';
      }
    } catch (e) {
      this._loading(false);
      this._showError('Endpoint unreachable.<br><small>' + esc(e.message) + '</small>');
    }
  }

  // ── result display ────────────────────────────────────────────

  _showResult(val, type) {
    let badge, cls;
    if (type === 'bool') {
      if (val === true)  { cls = 'ok';   badge = '✓ &nbsp;true';  }
      else               { cls = 'fail'; badge = '✗ &nbsp;false'; }
    } else if (type === 'missing') {
      cls = 'fail'; badge = '? &nbsp;missing variable';
    } else if (type === 'error') {
      cls = 'fail'; badge = '! &nbsp;evaluation error';
    } else {
      cls   = 'value';
      badge = esc(JSON.stringify(val));
    }
    const typeTag = type ? `<span class="result-type">${esc(type)}</span>` : '';
    this.$result.innerHTML = `<div class="result-inner">
      <span class="result-badge ${cls}">${badge}</span>
      ${typeTag}
    </div>`;
  }

  _showError(msg) {
    this.$result.innerHTML = `<div class="result-inner">
      <span class="result-badge fail">✗ &nbsp;Error</span>
    </div>
    <div class="result-error">${msg}</div>`;
  }

  // ── explain tree ─────────────────────────────────────────────

  _renderTree(root) {
    this.$tree.innerHTML = '';
    this.$tree.appendChild(this._buildNode(root));
  }

  _buildNode(node) {
    const hasKids  = Array.isArray(node.children) && node.children.length > 0;

    // Visual state is driven by the status the engine reports:
    //   evaluated       → ok / fail depending on `passed`
    //   short_circuited → skip (a sibling already resolved the parent)
    //   missing         → a required variable was absent from the context
    //   error           → the node raised a runtime error (type, div/0, NaN…)
    let cls, icon;
    switch (node.status) {
      case 'short_circuited': cls = 'skip'; icon = '○'; break;
      case 'missing':         cls = 'miss'; icon = '?'; break;
      case 'error':           cls = 'err';  icon = '!'; break;
      default:                cls = node.passed ? 'ok' : 'fail';
                              icon = node.passed ? '✓' : '✗';
    }

    const el = document.createElement('div');
    el.className = `tree-node ${cls}`;

    // Resolved values — only meaningful for an evaluated leaf.
    let valsHtml = '';
    if (!hasKids && node.status === 'evaluated' && node.leftValue !== undefined) {
      const lv = esc(JSON.stringify(node.leftValue));
      const rv = (node.rightValue !== undefined && node.rightValue !== null)
        ? esc(JSON.stringify(node.rightValue)) : null;
      const op  = node.operator ? esc(node.operator) : '';
      valsHtml = `<span class="tree-vals">
        <span class="tree-val-left">${lv}</span>
        ${op ? `<span class="tree-val-op">${op}</span>` : ''}
        ${rv !== null ? `<span class="tree-val-right">${rv}</span>` : ''}
      </span>`;
    }

    const chevron = hasKids
      ? `<span class="tree-chevron" id="chev-${Math.random().toString(36).slice(2)}">▾</span>`
      : `<span class="tree-chevron"></span>`;

    el.innerHTML = `<div class="tree-row">
      ${chevron}
      <span class="tree-icon">${icon}</span>
      <span class="tree-expr">${esc(node.expression || '')}</span>
      ${valsHtml}
    </div>`;

    // The "why" line: missing-variable path or runtime error message.
    if (node.detail) {
      const d = document.createElement('div');
      d.className = 'tree-detail';
      d.textContent = node.detail;
      el.appendChild(d);
    }

    if (hasKids) {
      const childWrap = document.createElement('div');
      childWrap.className = 'tree-children';
      for (const c of node.children) {
        childWrap.appendChild(this._buildNode(c));
      }
      el.appendChild(childWrap);

      // toggle
      const row = el.querySelector('.tree-row');
      const chev = row.querySelector('.tree-chevron');
      let open = true;
      row.addEventListener('click', () => {
        open = !open;
        childWrap.style.display = open ? '' : 'none';
        chev.classList.toggle('closed', !open);
      });
    }

    return el;
  }
}

// ── utils ─────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── boot ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => new PhpRulerWidget(CONFIG));
</script>
</body>
</html>
